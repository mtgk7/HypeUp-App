services:
  - type: web
    name: hypeup-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JAP_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://hypeuppp.vercel.app,https://frontend-gokbukmert-6873s-projects.vercel.app,https://frontend-hy1imm2di-gokbukmert-6873s-projects.vercel.app,http://localhost:3000
